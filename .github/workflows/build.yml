name: Automated Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # ÇÖZÜM: cl.exe ve x86 derleme ortam değişkenlerini otomatik olarak yükler
    - name: Initialize Visual Studio Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86

    - name: Compile Internal DLL Platform (x86 Release)
      run: |
        cl.exe /O2 /EHsc /LD /D_USRDLL /D_WINDLL src/*.cpp /link /OUT:FishBot.dll user32.lib gdi32.lib comctl32.lib psapi.lib /INCREMENTAL:NO /RELEASE

    - name: Upload Compiled Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Nostale-FishBot-DLL
        path: FishBot.dll
        
